<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERT YAPI | Yapım Aşamasında</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a; /* Derin Kurumsal Lacivert */
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .logo span {
            color: #c5a059; /* İnşaat/Altın Tonu */
        }

        .divider {
            width: 60px;
            height: 4px;
            background: #c5a059;
            margin: 20px auto;
        }

        .status-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 30px;
            border-radius: 4px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .status-content i {
            font-size: 50px;
            color: #c5a059;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .address-box {
            margin-top: 40px;
            font-size: 14px;
            color: #cbd5e1;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }

        .address-box strong {
            display: block;
            color: #c5a059;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            .logo { font-size: 32px; letter-spacing: 4px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">SERT <span>YAPI</span></div>
        <div class="divider"></div>
        
        <div class="status-content">
            <i class="fas fa-hard-hat"></i>
            <h1>Web Sitemiz Yapım Aşamasındadır</h1>
            
            <div class="address-box">
                <strong>MERKEZ OFİS</strong>
                Altınşehir Mahallesi, Gülçin Sokak No:39<br>
                34494 Başakşehir / İstanbul
            </div>
        </div>
    </div>

</body>
</html>
